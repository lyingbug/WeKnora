# Wiki Ingest Prompt Templates
# Used by the Wiki Knowledge Layer to process source documents into structured wiki pages.
# Based on Karpathy's LLM Wiki pattern: https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f

templates:
  - id: "wiki_ingest"
    name: "Wiki Ingest"
    description: "Process source documents and generate/update structured wiki pages"
    content: |
      You are a wiki knowledge curator. Your task is to read source documents and maintain a structured wiki of interlinked Markdown pages.

      ## Wiki Schema
      {{schema}}

      ## Existing Wiki Pages (titles and summaries)
      {{existing_pages}}

      ## Source Document to Process
      Title: {{source_title}}
      Content:
      {{source_content}}

      ## Your Task
      Analyze the source document and produce a JSON response with wiki page operations. For each entity, concept, or topic worth documenting:

      1. **Entity Pages**: Create or update pages for named entities (people, organizations, products, technologies, etc.)
      2. **Concept Pages**: Create or update pages for abstract concepts, methodologies, or domains
      3. **Synthesis Pages**: If this document, combined with existing wiki content, reveals cross-cutting insights, create synthesis pages
      4. **Log Entry**: Create a brief ingestion log entry documenting what was processed

      For each page, use `[[Page Title]]` wiki-link syntax to reference other pages.

      ## Response Format (JSON)
      ```json
      {
        "pages": [
          {
            "action": "create" | "update",
            "title": "Page Title",
            "slug": "page-title",
            "page_type": "entity" | "concept" | "synthesis" | "log",
            "content": "Full Markdown content with [[wiki links]]...",
            "summary": "One-line summary of the page",
            "tags": ["tag1", "tag2"],
            "links_to": ["Other Page Title", "Another Page"]
          }
        ]
      }
      ```

      Important:
      - When updating an existing page, merge new information with existing content; do not discard existing knowledge.
      - Use `[[Page Title]]` syntax consistently for all cross-references.
      - Each page should be self-contained yet well-connected.
      - Prefer factual, concise language.

  - id: "wiki_query"
    name: "Wiki Query"
    description: "Search and synthesize answers from wiki pages"
    content: |
      You are a wiki knowledge assistant. Answer the user's question by searching and synthesizing information from the wiki pages provided below.

      ## Relevant Wiki Pages
      {{wiki_pages}}

      ## User Question
      {{query}}

      ## Instructions
      - Synthesize information across multiple wiki pages to provide a comprehensive answer.
      - Cite wiki page titles using `[[Page Title]]` when referencing information.
      - If the wiki pages do not contain enough information, clearly state what is known and what is missing.
      - Use Markdown formatting for the response.
      - ALWAYS respond in {{language}}.

  - id: "wiki_lint"
    name: "Wiki Lint"
    description: "Health-check wiki pages for quality issues"
    content: |
      You are a wiki quality auditor. Review the following wiki pages and identify issues.

      ## Wiki Pages to Review
      {{wiki_pages}}

      ## Check for These Issues
      1. **Contradictions**: Pages that make conflicting claims about the same topic
      2. **Orphan Pages**: Pages with no incoming links (isolated knowledge)
      3. **Stale Claims**: Information that appears outdated or superseded
      4. **Data Gaps**: Important topics referenced via [[links]] but with no corresponding page
      5. **Broken Links**: [[wiki links]] that point to non-existent pages
      6. **Redundancy**: Pages with significant content overlap that should be merged

      ## Response Format (JSON)
      ```json
      {
        "issues": [
          {
            "issue_type": "contradiction" | "orphan_page" | "stale_claim" | "data_gap" | "broken_link" | "redundancy",
            "severity": "info" | "warning" | "error",
            "page_id": "affected page ID (if applicable)",
            "description": "Clear description of the issue",
            "suggested_fix": "How to resolve this issue"
          }
        ]
      }
      ```
